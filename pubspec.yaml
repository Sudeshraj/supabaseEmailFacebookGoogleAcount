name: flutter_application_1
description: "MySalon - Salon Booking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # ================================================================
  # 🔥 FIREBASE
  # ================================================================
  firebase_core: ^4.1.1 
  firebase_messaging: ^16.1.1
  
  # ================================================================
  # 🔥 NOTIFICATIONS
  # ================================================================
  flutter_local_notifications: ^22.0.1

  # ================================================================
  # 🔥 UTILITIES
  # ================================================================
  universal_platform: ^1.1.0
  cupertino_icons: ^1.0.8   
  provider: ^6.1.5+1   
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.3.1
  country_picker: ^2.0.27
  flutter_libphonenumber: ^2.5.1
  flutter_multi_formatter: ^2.13.10  
  connectivity_plus: ^7.0.0
  http: ^1.6.0
  web: ^1.1.1

  # ================================================================
  # 🔥 NAVIGATION & AUTH
  # ================================================================
  supabase_flutter: ^2.12.0
  go_router: ^17.0.1
  
  # ================================================================
  # 🔥 ENVIRONMENT
  # ================================================================
  flutter_dotenv: ^6.0.0
  url_strategy: ^0.3.0

  # ================================================================
  # 🔥 ICONS & IMAGES
  # ================================================================
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.3
  package_info_plus: ^10.2.0
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^11.0.0

  # ================================================================
  # 🔥 SOCIAL LOGIN
  # ================================================================
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.5
  sign_in_with_apple: ^8.1.0
  flutter_web_auth_2: ^5.0.1

  # ================================================================
  # 🔥 SETTINGS & IMAGES
  # ================================================================
  app_settings: ^7.0.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.1
  image_cropper: ^12.1.0

  # ================================================================
  # 🔥 TIMEZONE
  # ================================================================
  timezone: ^0.11.1
  # flutter_native_timezone: ^2.0.0
  flutter_timezone: ^4.1.1
  google_fonts: ^8.1.0
  # Deep linking configuration for Android and iOS can be added here if needed.
  app_links: ^7.2.1
   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ================================================================
# 🔥 FLUTTER LAUNCHER ICONS
# ================================================================

flutter_launcher_icons:
  android: true
  image_path_android: "assets/logo.png"
  adaptive_icon_background: "#FF6B8B"
  adaptive_icon_foreground: "assets/logo.png"
  
  ios: true
  image_path_ios: "assets/logo.png"
  remove_alpha_ios: true
  
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#FF6B8B"

# ================================================================
# 🔥 FLUTTER CONFIG
# ================================================================

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - .env
    - .env.production
  #   - assets/images/
  #   - assets/icons/
  #   - assets/fonts/
  
